name: "HAOS Kiosk Display"
description: "Start X server and browser on local HAOS server"
version: "1.3.5"
slug: "haoskiosk"
url: "https://github.com/puterboy/HAOS-kiosk/tree/main/haoskiosk"

arch:
  - aarch64
  - amd64

startup: application
host_network: true
host_ipc: true
full_access: true
privileged:
  - SYS_ADMIN
gpu: true

devices:
  - /dev/tty0:/dev/tty0
  - /dev/fb0:/dev/fb0
  - /dev/dri:/dev/dri
  - /dev/vchiq:/dev/vchiq
  - /dev/input:/dev/input

map:
  - addon_config:rw
  - media:rw

options:
  ha_url: "http://localhost:8123"
  ha_dashboard: ""
  login_delay: 1.0
  zoom_level: 100
  browser_refresh: 600
  screen_timeout: 0
  output_number: 1
  dark_mode: true
  rotate_display: "normal"
  map_touch_inputs: false
  keyboard_layout: us
  cursor_timeout: 5
  onscreen_keyboard: true
  save_onscreen_config: true
  xorg_conf: ""
  xorg_append_replace: "replace"
  audio_sink: "auto"
  rest_ip: "127.0.0.1"
  rest_port: 8080
  command_whitelist: "cat|date|dbus-send|echo|false|grep|head|ls|notify-send|ping|ps|sleep|tail|top|true|xdotool|xset"
  debug_mode: false

schema:
  ha_username: str
  ha_password: password
  ha_url: str
  ha_dashboard: str?
  login_delay: float(0,)
  zoom_level: int(10,1000)
  browser_refresh: int(0,)
  screen_timeout: int(0,)
  output_number: int(1,2)
  dark_mode: bool
  rotate_display: list(normal|left|right|inverted)
  map_touch_inputs: bool
  cursor_timeout: int
  keyboard_layout: str
  onscreen_keyboard: bool
  save_onscreen_config: bool
  xorg_conf: str?
  xorg_append_replace: list(append|replace)
  audio_sink: list(auto|hdmi|usb|none)
  rest_ip: str
  rest_port: int(1024,49151)
  command_whitelist: str
  debug_mode: bool
